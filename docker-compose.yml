services:
  # ── Backend (Laravel API) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supporthub-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: supporthub
      DB_USERNAME: supporthub
      DB_PASSWORD: secret
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,localhost:8000"
    networks:
      - supporthub

  # ── Nginx (Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: supporthub-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - supporthub

  # ── Frontend (React SPA) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supporthub-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
    networks:
      - supporthub

  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: supporthub-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: supporthub
      MYSQL_USER: supporthub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supporthub

networks:
  supporthub:
    driver: bridge

volumes:
  db_data:
    driver: local
